esphome:
  name: bedroom-esp32
  friendly_name: ESP32 Bluetooth Proxy + DHT11 Bedroom

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pass
  power_save_mode: none
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_pass

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time

udp:
  addresses: !secret home_server_ip

syslog:
  port: 5514

esp32_ble:
  max_connections: 1

esp32_ble_tracker:

globals:
  - id: br_ready
    type: bool
    initial_value: 'false'
  - id: br_pos_byte
    type: int
    initial_value: '0'
  - id: br_group_byte
    type: int
    initial_value: '0'

ble_client:
  - mac_address: FD:74:46:D2:50:0F
    id: bedroom_blind
    on_connect:
      then:
        - logger.log:
            level: INFO
            format: "Bedroom blind connected - sending handshake"
        - delay: 500ms
        - ble_client.ble_write:
            id: bedroom_blind
            service_uuid: "00010203-0405-0607-0809-0a0b0c0d1910"
            characteristic_uuid: "00010405-0405-0607-0809-0a0b0c0d1910"
            value: [0xff, 0x03, 0x03, 0x03, 0x03, 0x78, 0x78, 0x78, 0x78, 0x78, 0x78]
        - delay: 200ms
        - ble_client.ble_write:
            id: bedroom_blind
            service_uuid: "00010203-0405-0607-0809-0a0b0c0d1910"
            characteristic_uuid: "00010405-0405-0607-0809-0a0b0c0d1910"
            value: !lambda |-
              auto t = id(sntp_time).now();
              ESP_LOGI("blind", "Sending timestamp %04d-%02d-%02d %02d:%02d:%02d",
                t.year, t.month, t.day_of_month, t.hour, t.minute, t.second);
              return {0xff, 0x78, 0xea, 0x41, 0x02, 0x00,
                      (uint8_t)(t.year - 2000),
                      (uint8_t)t.month,
                      (uint8_t)t.day_of_month,
                      (uint8_t)t.hour,
                      (uint8_t)t.minute,
                      (uint8_t)t.second};
        - delay: 200ms
        - lambda: id(br_ready) = true;
        - logger.log:
            level: INFO
            format: "Bedroom blind ready"
    on_disconnect:
      then:
        - lambda: id(br_ready) = false;
        - logger.log:
            level: WARN
            format: "Bedroom blind disconnected"

button:
  - platform: restart
    name: "Restart"

cover:
  - platform: template
    id: bedroom_blind_cover
    name: "Bedroom Blind"
    device_class: blind
    has_position: true
    open_action:
      - if:
          condition:
            lambda: return id(br_ready);
          then:
            - logger.log:
                level: INFO
                format: "Bedroom blind: open"
            - ble_client.ble_write:
                id: bedroom_blind
                service_uuid: "00010203-0405-0607-0809-0a0b0c0d1910"
                characteristic_uuid: "00010405-0405-0607-0809-0a0b0c0d1910"
                value: [0xff, 0x78, 0xea, 0x41, 0xbf, 0x03, 0xe8, 0x03]
            - cover.template.publish:
                id: bedroom_blind_cover
                state: OPEN
                current_operation: IDLE
          else:
            - logger.log:
                level: WARN
                format: "Bedroom blind: open dropped (not connected)"
    close_action:
      - if:
          condition:
            lambda: return id(br_ready);
          then:
            - logger.log:
                level: INFO
                format: "Bedroom blind: close"
            - ble_client.ble_write:
                id: bedroom_blind
                service_uuid: "00010203-0405-0607-0809-0a0b0c0d1910"
                characteristic_uuid: "00010405-0405-0607-0809-0a0b0c0d1910"
                value: [0xff, 0x78, 0xea, 0x41, 0xbf, 0x03, 0x00, 0x00]
            - cover.template.publish:
                id: bedroom_blind_cover
                state: CLOSED
                current_operation: IDLE
          else:
            - logger.log:
                level: WARN
                format: "Bedroom blind: close dropped (not connected)"
    stop_action:
      - if:
          condition:
            lambda: return id(br_ready);
          then:
            - logger.log:
                level: INFO
                format: "Bedroom blind: stop"
            - ble_client.ble_write:
                id: bedroom_blind
                service_uuid: "00010203-0405-0607-0809-0a0b0c0d1910"
                characteristic_uuid: "00010405-0405-0607-0809-0a0b0c0d1910"
                value: [0xff, 0x78, 0xea, 0x41, 0x5f, 0x03, 0x01]
            - cover.template.publish:
                id: bedroom_blind_cover
                current_operation: IDLE
          else:
            - logger.log:
                level: WARN
                format: "Bedroom blind: stop dropped (not connected)"
    position_action:
      - lambda: |-
          int pct = (int)((1.0f - pos) * 100.0f + 0.5f);
          id(br_pos_byte) = ((100 - pct) * 10) % 256;
          if (pct > 74) id(br_group_byte) = 0x00;
          else if (pct > 48) id(br_group_byte) = 0x01;
          else if (pct > 23) id(br_group_byte) = 0x02;
          else id(br_group_byte) = 0x03;
          ESP_LOGI("blind", "Bedroom blind: set position %d%%", (int)(pos*100));
      - if:
          condition:
            lambda: return id(br_ready);
          then:
            - ble_client.ble_write:
                id: bedroom_blind
                service_uuid: "00010203-0405-0607-0809-0a0b0c0d1910"
                characteristic_uuid: "00010405-0405-0607-0809-0a0b0c0d1910"
                value: !lambda "return {0xff, 0x78, 0xea, 0x41, 0xbf, 0x03, (uint8_t)id(br_pos_byte), (uint8_t)id(br_group_byte)};"
            - cover.template.publish:
                id: bedroom_blind_cover
                position: !lambda return pos;
                current_operation: IDLE
          else:
            - logger.log:
                level: WARN
                format: "Bedroom blind: set position dropped (not connected)"
